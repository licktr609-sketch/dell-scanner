<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Scanner Dell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
    .logo-text { font-size: 17px; font-weight: 600; color: #111; }
    .logo-sub  { font-size: 12px; color: #888; margin-top: 1px; }
    .logo-icon {
      width: 32px; height: 32px; background: #0076CE;
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 18px; font-weight: 800;
    }

    #scanner-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1rem;
      position: relative;
    }
    /* Dynamsoft injecte sa vidéo ici */
    #scanner-wrap > div { width: 100% !important; height: 100% !important; }

    #placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: #777; font-size: 14px;
      pointer-events: none;
    }
    #placeholder .icon { font-size: 40px; opacity: 0.5; }

    #status {
      text-align: center; font-size: 13px; color: #888;
      margin: 0 0 0.75rem; min-height: 18px;
    }
    #status.ok  { color: #2e7d32; font-weight: 500; }
    #status.err { color: #c62828; }

    .btn {
      display: block; width: 100%; padding: 13px;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary   { background: #0076CE; color: #fff; }
    .btn-secondary { background: #eee; color: #333; margin-top: 8px; }

    .sep {
      display: flex; align-items: center; gap: 10px;
      margin: 1rem 0; color: #bbb; font-size: 12px;
    }
    .sep::before, .sep::after { content:''; flex:1; height:1px; background:#e5e5e5; }

    .manual-row { display: flex; gap: 8px; }
    .manual-row input {
      flex: 1; padding: 11px 12px;
      border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 15px; outline: none;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .manual-row input:focus { border-color: #0076CE; }
    .manual-row button {
      padding: 11px 18px;
      background: #0076CE; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 500; cursor: pointer;
    }

    #result {
      display: none; margin-top: 1rem;
      background: #f0f7ff; border: 1.5px solid #b3d4f5;
      border-radius: 12px; padding: 1rem;
    }
    #result.visible { display: block; }
    .r-label { font-size: 11px; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
    .r-value { font-size: 26px; font-weight:700; color:#111; letter-spacing:3px; margin-bottom:1rem; }
    .btn-dell {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 13px;
      background: #0076CE; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 500;
      cursor: pointer; text-decoration: none;
    }
    .btn-rescan {
      display: block; width: 100%; padding: 10px;
      background: transparent; color: #0076CE;
      border: 1.5px solid #0076CE; border-radius: 10px;
      font-size: 14px; cursor: pointer; margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="card">

  <div class="logo">
    <div class="logo-icon">D</div>
    <div>
      <div class="logo-text">Scanner Dell</div>
      <div class="logo-sub">Support Serveur</div>
    </div>
  </div>

  <div id="scanner-wrap">
    <div id="dce-video-container"></div>
    <div id="placeholder">
      <div class="icon">▦</div>
      Caméra inactive
    </div>
  </div>

  <p id="status">Appuyez sur Démarrer pour scanner</p>

  <button class="btn btn-primary" id="start-btn" onclick="startScan()">📷 Démarrer la caméra</button>
  <button class="btn btn-secondary" id="stop-btn" style="display:none" onclick="stopScan()">⏹ Arrêter</button>

  <div class="sep">ou saisie manuelle</div>
  <div class="manual-row">
    <input id="tag-input" type="text" placeholder="Ex : ABC1234" maxlength="12"/>
    <button onclick="goManual()">→</button>
  </div>

  <div id="result">
    <div class="r-label">Service Tag détecté</div>
    <div class="r-value" id="result-tag">—</div>
    <a id="dell-link" class="btn-dell" target="_blank" rel="noopener">Ouvrir Dell Support →</a>
    <button class="btn-rescan" onclick="rescan()">🔄 Scanner à nouveau</button>
  </div>

</div>

<!-- Dynamsoft Barcode Reader — moteur JS le plus puissant du marché -->
<script src="https://cdn.jsdelivr.net/npm/dynamsoft-javascript-barcode@9.6.42/dist/dbr.js"></script>

<script>
(function() {
  'use strict';

  // Clé de licence trial Dynamsoft (valide 7 jours par domaine)
  // Remplace par ta propre clé sur https://www.dynamsoft.com/customer/license/trialLicense
  Dynamsoft.DBR.BarcodeReader.licenseServer = ['https://mdls.dynamsoft.com'];
  Dynamsoft.DBR.BarcodeReader.license = 'DLS2eyJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSJ9';

  let scanner = null;

  function buildUrl(tag) {
    return 'https://www.dell.com/support/home/fr-fr/product-support/servicetag/'
           + encodeURIComponent(tag.toUpperCase()) + '/overview';
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className   = cls || '';
  }

  function showResult(raw) {
    const tag = raw.trim().toUpperCase();
    document.getElementById('result-tag').textContent = tag;
    document.getElementById('dell-link').href = buildUrl(tag);
    document.getElementById('result').classList.add('visible');
    setStatus('✓ Service Tag : ' + tag, 'ok');
    stopScan();
    window.open(buildUrl(tag), '_blank');
  }

  window.startScan = async function() {
    document.getElementById('result').classList.remove('visible');
    setStatus('Initialisation du scanner…');
    document.getElementById('start-btn').disabled = true;
    document.getElementById('placeholder').style.display = 'none';

    try {
      if (!scanner) {
        scanner = await Dynamsoft.DBR.BarcodeScanner.createInstance();

        // Config : codes-barres 1D uniquement (plus rapide)
        await scanner.updateRuntimeSettings('speed');
        const settings = await scanner.getRuntimeSettings();
        settings.barcodeFormatIds =
          Dynamsoft.DBR.EnumBarcodeFormat.BF_CODE_39   |
          Dynamsoft.DBR.EnumBarcodeFormat.BF_CODE_128  |
          Dynamsoft.DBR.EnumBarcodeFormat.BF_CODE_93   |
          Dynamsoft.DBR.EnumBarcodeFormat.BF_EAN_13    |
          Dynamsoft.DBR.EnumBarcodeFormat.BF_EAN_8     |
          Dynamsoft.DBR.EnumBarcodeFormat.BF_ITF;
        settings.expectedBarcodesCount = 1;
        await scanner.updateRuntimeSettings(settings);

        scanner.onFrameRead = results => {
          if (results && results.length > 0) {
            const val = results[0].barcodeText;
            if (val && val.replace(/\s/g,'').length >= 4) {
              showResult(val.replace(/\s/g,''));
            }
          }
        };

        // Injecte la vidéo dans notre conteneur
        scanner.setUIElement(document.getElementById('dce-video-container'));
      }

      await scanner.open();

      // Force caméra arrière
      try {
        const cameras = await scanner.getAllCameras();
        const back = cameras.find(c =>
          c.label.toLowerCase().includes('back') ||
          c.label.toLowerCase().includes('arrière') ||
          c.label.toLowerCase().includes('rear') ||
          c.label.toLowerCase().includes('environment')
        );
        if (back) await scanner.setCurrentCamera(back);
        else if (cameras.length > 1) await scanner.setCurrentCamera(cameras[cameras.length - 1]);

        // Résolution maximale
        await scanner.setResolution(1280, 720);
      } catch(_) {}

      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('stop-btn').style.display  = 'block';
      setStatus('Pointez vers le code-barres du serveur…');

    } catch(e) {
      setStatus('Erreur : ' + e.message, 'err');
      document.getElementById('start-btn').disabled = false;
      document.getElementById('placeholder').style.display = 'flex';
    }
  };

  window.stopScan = async function() {
    if (scanner) {
      try { await scanner.close(); } catch(_) {}
    }
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('start-btn').disabled      = false;
    document.getElementById('stop-btn').style.display  = 'none';
    document.getElementById('placeholder').style.display = 'flex';
    setStatus('Scanner arrêté.');
  };

  window.rescan = async function() {
    document.getElementById('result').classList.remove('visible');
    await window.startScan();
  };

  window.goManual = function() {
    const v = document.getElementById('tag-input').value.trim();
    if (v.length < 4) { setStatus('Entrez au moins 4 caractères', 'err'); return; }
    showResult(v);
  };

  document.getElementById('tag-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.goManual();
  });

})();
</script>
</body>
</html>
