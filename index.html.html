<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner Code-Barres Dell</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
    .container { width: 100%; max-width: 600px; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; color: #111; }
    #video-box { position: relative; width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; background: #000; aspect-ratio: 16/7; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    #scan-line { width: 70%; height: 2px; background: #E24B4A; animation: scan 2s ease-in-out infinite; }
    @keyframes scan { 0%,100% { transform: translateY(-60px); opacity: 0.4; } 50% { transform: translateY(60px); opacity: 1; } }
    #status { font-size: 13px; color: #666; margin: 0.75rem 0 0; text-align: center; }
    #result-card { display: none; background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1rem; }
    #result-card.visible { display: block; }
    .result-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .result-value { font-size: 20px; font-weight: 500; color: #111; margin-bottom: 1rem; }
    #dell-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border: 1px solid #ccc; border-radius: 8px; background: transparent; color: #111; font-size: 14px; cursor: pointer; text-decoration: none; }
    #dell-btn:hover { background: #f0f0f0; }
    #start-btn { display: block; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background: transparent; color: #111; font-size: 14px; cursor: pointer; margin-top: 0.75rem; }
    #start-btn:hover { background: #f0f0f0; }
    #manual-box { display: flex; gap: 8px; margin-top: 1rem; }
    #manual-input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 14px; }
    #manual-btn { padding: 8px 16px; border: 1px solid #ccc; border-radius: 8px; background: transparent; color: #111; font-size: 14px; cursor: pointer; white-space: nowrap; }
    #manual-btn:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Scanner Code-Barres Dell</h1>

    <div id="video-box">
      <video id="video" autoplay playsinline muted></video>
      <div id="overlay"><div id="scan-line"></div></div>
    </div>
    <p id="status">Cliquez sur "Démarrer la caméra" pour commencer</p>
    <button id="start-btn" onclick="startCamera()">📷 Démarrer la caméra</button>

    <div id="manual-box">
      <input id="manual-input" type="text" placeholder="Ou entrez le Service Tag manuellement (ex: ABC1234)" maxlength="20" />
      <button id="manual-btn" onclick="handleTag(document.getElementById('manual-input').value.trim())">Rechercher →</button>
    </div>

    <div id="result-card">
      <p class="result-label">Service Tag détecté</p>
      <p class="result-value" id="tag-display">—</p>
      <a id="dell-btn" target="_blank" rel="noopener">🔗 Ouvrir sur Dell Support</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
  <script>
    let scanning = false;

    function buildDellUrl(serviceTag) {
      const encoded = btoa(serviceTag);
      return `https://www.dell.com/support/product-details/fr-fr/servicetag/0-${encoded}/overview`;
    }

    function handleTag(tag) {
      if (!tag) return;
      const url = buildDellUrl(tag);
      document.getElementById('tag-display').textContent = tag;
      document.getElementById('dell-btn').href = url;
      document.getElementById('result-card').classList.add('visible');
      document.getElementById('status').textContent = `✓ Service Tag trouvé : ${tag}`;
      if (scanning) {
        Quagga.stop();
        scanning = false;
        document.getElementById('start-btn').textContent = '📷 Démarrer la caméra';
        document.getElementById('start-btn').onclick = startCamera;
      }
    }

    function startCamera() {
      document.getElementById('status').textContent = 'Initialisation de la caméra...';
      document.getElementById('start-btn').disabled = true;

      Quagga.init({
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.getElementById('video'),
          constraints: { facingMode: "environment", width: 640, height: 280 }
        },
        decoder: {
          readers: ["code_39_reader", "code_128_reader", "ean_reader", "ean_8_reader"]
        },
        locate: true
      }, function(err) {
        if (err) {
          document.getElementById('status').textContent = 'Erreur caméra : ' + err.message + '. Utilisez la saisie manuelle.';
          document.getElementById('start-btn').disabled = false;
          return;
        }
        Quagga.start();
        scanning = true;
        document.getElementById('status').textContent = 'Pointez vers le code-barres du serveur Dell…';
        document.getElementById('start-btn').textContent = '⏹ Arrêter';
        document.getElementById('start-btn').onclick = stopCamera;
        document.getElementById('start-btn').disabled = false;
      });

      Quagga.onDetected(function(result) {
        const code = result.codeResult.code;
        if (code && code.length >= 5) {
          handleTag(code);
        }
      });
    }

    function stopCamera() {
      Quagga.stop();
      scanning = false;
      document.getElementById('status').textContent = 'Caméra arrêtée.';
      document.getElementById('start-btn').textContent = '📷 Démarrer la caméra';
      document.getElementById('start-btn').onclick = startCamera;
    }
  </script>
</body>
</html>
