<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner Code-Barres Dell</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
    .container { width: 100%; max-width: 600px; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; color: #111; }
    #video-box { position: relative; width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; background: #000; aspect-ratio: 4/3; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #scan-frame { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    #scan-rect { width: 75%; height: 40%; border: 2px solid #E24B4A; border-radius: 8px; position: relative; }
    #scan-line { position: absolute; left: 0; right: 0; height: 2px; background: #E24B4A; animation: scan 2s ease-in-out infinite; }
    @keyframes scan { 0%,100% { top: 0; opacity: 0.4; } 50% { top: calc(100% - 2px); opacity: 1; } }
    #status { font-size: 13px; color: #666; margin: 0.75rem 0 0; text-align: center; min-height: 20px; }
    #result-card { display: none; background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1rem; }
    #result-card.visible { display: block; }
    .result-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .result-value { font-size: 20px; font-weight: 500; color: #111; margin-bottom: 1rem; word-break: break-all; }
    #dell-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border: 1px solid #ccc; border-radius: 8px; background: transparent; color: #111; font-size: 14px; cursor: pointer; text-decoration: none; }
    #dell-btn:hover { background: #f0f0f0; }
    #start-btn { display: block; width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; background: #111; color: #fff; font-size: 15px; cursor: pointer; margin-top: 0.75rem; }
    #start-btn:disabled { opacity: 0.5; }
    #manual-box { display: flex; gap: 8px; margin-top: 1rem; }
    #manual-input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 14px; }
    #manual-btn { padding: 8px 16px; border: 1px solid #ccc; border-radius: 8px; background: transparent; color: #111; font-size: 14px; cursor: pointer; white-space: nowrap; }
    #manual-btn:hover { background: #f0f0f0; }
    #rescan-btn { display: none; margin-top: 0.75rem; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background: transparent; color: #111; font-size: 14px; cursor: pointer; }
    #rescan-btn:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Scanner Code-Barres Dell</h1>

    <div id="video-box">
      <video id="video" autoplay playsinline muted></video>
      <div id="scan-frame">
        <div id="scan-rect"><div id="scan-line"></div></div>
      </div>
    </div>
    <p id="status">Appuyez sur le bouton pour démarrer</p>
    <button id="start-btn" onclick="startCamera()">📷 Démarrer la caméra</button>
    <button id="rescan-btn" onclick="rescan()">🔄 Scanner à nouveau</button>

    <div id="manual-box">
      <input id="manual-input" type="text" placeholder="Service Tag manuel (ex: ABC1234)" maxlength="20" />
      <button id="manual-btn" onclick="handleTag(document.getElementById('manual-input').value.trim())">Rechercher →</button>
    </div>

    <div id="result-card">
      <p class="result-label">Service Tag détecté</p>
      <p class="result-value" id="tag-display">—</p>
      <a id="dell-btn" target="_blank" rel="noopener">🔗 Ouvrir sur Dell Support</a>
    </div>
  </div>

  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script>
    let codeReader = null;
    let scanning = false;

    function buildDellUrl(serviceTag) {
      const encoded = btoa(serviceTag);
      return `https://www.dell.com/support/product-details/fr-fr/servicetag/0-${encoded}/overview`;
    }

    function handleTag(tag) {
      if (!tag) return;
      const url = buildDellUrl(tag);
      document.getElementById('tag-display').textContent = tag;
      document.getElementById('dell-btn').href = url;
      document.getElementById('result-card').classList.add('visible');
      document.getElementById('status').textContent = '✓ Service Tag trouvé : ' + tag;
      document.getElementById('rescan-btn').style.display = 'block';
      document.getElementById('start-btn').style.display = 'none';
      stopCamera();
    }

    async function startCamera() {
      document.getElementById('start-btn').disabled = true;
      document.getElementById('status').textContent = 'Initialisation de la caméra...';

      try {
        codeReader = new ZXing.BrowserMultiFormatReader();

        // Force caméra arrière sur mobile
        const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
        let deviceId = undefined;
        if (devices.length > 1) {
          // Cherche la caméra arrière
          const back = devices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('arrière') || d.label.toLowerCase().includes('environment'));
          deviceId = back ? back.deviceId : devices[devices.length - 1].deviceId;
        }

        scanning = true;
        document.getElementById('status').textContent = 'Pointez vers le code-barres…';

        await codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {
          if (result) {
            const code = result.getText();
            if (code && code.length >= 5) {
              handleTag(code);
            }
          }
        });

      } catch (err) {
        document.getElementById('status').textContent = 'Erreur : ' + err.message;
        document.getElementById('start-btn').disabled = false;
        document.getElementById('start-btn').textContent = '📷 Réessayer';
      }
    }

    function stopCamera() {
      if (codeReader) {
        codeReader.reset();
        codeReader = null;
      }
      scanning = false;
    }

    function rescan() {
      document.getElementById('result-card').classList.remove('visible');
      document.getElementById('rescan-btn').style.display = 'none';
      document.getElementById('start-btn').style.display = 'block';
      document.getElementById('start-btn').disabled = false;
      document.getElementById('start-btn').textContent = '📷 Démarrer la caméra';
      document.getElementById('status').textContent = 'Appuyez sur le bouton pour démarrer';
    }
  </script>
</body>
</html>
